<!doctype html>
<html lang="hu">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Vlxchat — Secure Relay</title>
<link rel="icon" type="image/png" href="/assets/logo.png" />
<link rel="stylesheet" href="/assets/style.css" />
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="/assets/logo.png" alt="Veloxis" class="brand-icon" />
    <span class="brand-name">Vlxchat</span>
  </div>
  <div class="topbar-right">
    <span class="badge badge-green" id="cryptoBadge">E2EE ACTIVE</span>
    <button class="btn btn-danger btn-small" id="panicBtn" title="Munkamenet azonnali törlése és lecsatlakozás">
      &#9888; Panic
    </button>
  </div>
</div>

<main id="gateView" class="gate">
  <div class="modal">
    <div class="modal-header">
      <img src="/assets/logo.png" class="modal-icon" alt="" />
      <span>Secure Session</span>
    </div>

    <div class="tabs">
      <button class="tab active" data-tab="create">Új szoba</button>
      <button class="tab" data-tab="join">Csatlakozás</button>
    </div>

    <section class="tab-panel" data-panel="create">
      <label>Megjelenített név</label>
      <input type="text" id="createName" placeholder="pl. Falcon-1" maxlength="32" />

      <label>Szoba kód <span class="hint">(automatikusan generálva)</span></label>
      <div class="row">
        <input type="text" id="createRoomCode" readonly />
        <button class="btn btn-ghost" id="regenRoomBtn" type="button">Új kód</button>
      </div>

      <label>Titkosítási jelmondat <span class="hint">(oszd meg más csatornán!)</span></label>
      <div class="row">
        <input type="text" id="createPass" placeholder="pl. sólyom-hegy-19-torony" />
        <button class="btn btn-ghost" id="regenPassBtn" type="button">Generál</button>
      </div>

      <p class="warn">A jelmondatot soha nem küldjük el a szervernek. Csak azok tudják olvasni az üzeneteket, akiknek megadod a szoba kódot ÉS a jelmondatot is, egy másik csatornán.</p>

      <button class="btn btn-primary btn-block" id="createBtn">Szoba létrehozása</button>
    </section>

    <section class="tab-panel hidden" data-panel="join">
      <label>Megjelenített név</label>
      <input type="text" id="joinName" placeholder="pl. Falcon-2" maxlength="32" />

      <label>Szoba kód</label>
      <input type="text" id="joinRoomCode" placeholder="pl. a91c7f2e0b3d" />

      <label>Titkosítási jelmondat</label>
      <input type="text" id="joinPass" placeholder="a kapott jelmondat" />

      <button class="btn btn-primary btn-block" id="joinBtn">Csatlakozás</button>
    </section>

    <p class="err hidden" id="gateError"></p>
  </div>
</main>

<main id="chatView" class="chat hidden">
  <div class="chat-window" id="messages"></div>

  <form class="composer" id="composerForm">
    <select id="ttlSelect" title="Önmegsemmisítés">
      <option value="0">Nincs lejárat</option>
      <option value="30">30 mp múlva törlődik</option>
      <option value="120">2 perc múlva törlődik</option>
      <option value="600">10 perc múlva törlődik</option>
    </select>
    <input type="text" id="msgInput" placeholder="Titkosított üzenet…" autocomplete="off" maxlength="4000" />
    <button class="btn btn-primary" type="submit">Küldés</button>
  </form>
</main>

<footer class="statusbar">
  <span id="statusLeft">nincs aktív munkamenet</span>
  <span id="statusClock">--:--:--</span>
</footer>

<script src="/assets/app.js"></script>
</body>
</html>
